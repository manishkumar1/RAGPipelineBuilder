services:

  api:
    build: .
    container_name: rag-api
    command: uvicorn api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  webui:
    build: .
    container_name: rag-webui
    command: uvicorn webui:app --host 0.0.0.0 --port 7860
    ports:
      - "7860:7860"
    env_file:
      - .env
    environment:
      - API_BASE_URL=http://api:8000
    depends_on:
      - api
    restart: unless-stopped
